name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: false

      - name: Build package artifacts
        run: npm run build:package
        env:
          GUARD_IRON_PROXY_REPO: https://github.com/oripka/iron-proxy
          GUARD_IRON_PROXY_REF: main

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guard-${{ runner.os }}-${{ runner.arch }}
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-dist
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release-upload
          find release-dist -type f -maxdepth 3 -print -exec cp {} release-upload/ \;
          (cd release-upload && sha256sum * > SHA256SUMS.all)

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-upload/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Alpha Guard build artifacts. CLI tarballs are the easiest install path; daemon and desktop editions are experimental."
